services:
  proxyos:
    build: .
    image: proxyos:latest
    container_name: proxyos
    restart: unless-stopped
    env_file: .env
    environment:
      - NODE_ENV=production
      - PORT=${PROXYOS_DASHBOARD_PORT:-3000}
    ports:
      - "${PROXYOS_HTTP_PORT:-80}:80"
      - "${PROXYOS_HTTPS_PORT:-443}:443"
      - "${PROXYOS_HTTPS_PORT:-443}:443/udp"
      - "${PROXYOS_DASHBOARD_PORT:-3000}:${PROXYOS_DASHBOARD_PORT:-3000}"
    volumes:
      - proxyos-data:/data/proxyos
      - caddy-data:/data/caddy
      - caddy-config:/config/caddy

volumes:
  proxyos-data:
  caddy-data:
  caddy-config:
