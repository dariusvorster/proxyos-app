name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Run unit tests
        run: pnpm --filter @proxyos/caddy test
      - name: Run DB migration tests
        run: pnpm --filter @proxyos/db test

  typecheck:
    name: Type check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile
      - name: Typecheck caddy package
        run: pnpm --filter @proxyos/caddy typecheck
      - name: Typecheck db package
        run: pnpm --filter @proxyos/db typecheck

  lint:
    name: Shadow guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check no JS shadows
        run: bash scripts/check-no-js-shadows.sh
