server {
    listen 443 ssl;
    server_name api.example.com;

    location /api/ {
        auth_request /auth;

        if ($request_method = POST) {
            return 403;
        }

        proxy_pass http://api-backend:3000;
        proxy_set_header Host $host;
    }

    location = /auth {
        proxy_pass http://auth-service:8080/verify;
    }
}
